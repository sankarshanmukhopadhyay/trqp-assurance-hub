name: quality
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  markdown_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Markdown lint
        uses: avto-dev/markdown-lint@04d43ee9191307b50935a753da3b775ab695eceb # v1
        with:
          config: '.markdownlint.yml'
          args: '**/*.md'
  link_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Be strict on real breakage, but resilient to transient network churn and 429s.
          args: >-
            --verbose --no-progress
            --max-retries 3 --retry-wait-time 2 --timeout 20
            --max-redirects 10
            --accept 200,201,202,204,206,301,302,303,307,308,401,403,429
            '**/*.md'
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: Validate examples against schemas
        run: python tools/validate_examples.py
      - name: Doc tests (JSON/YAML parse hygiene)
        run: python scripts/doc_tests.py
      - name: generate-manifest dry-run (manifest generation path stays green)
        run: |
          python tools/generate-manifest.py \
            --build-id "dry-run-check" \
            --target "https://registry.example.org" \
            --cs-version "1.1.0" \
            --cs-profile-id "baseline" \
            --cs-run-id "dry-run-cts" \
            --tspp-version "0.9.0" \
            --tspp-assurance-level "AL1" \
            --tspp-run-id "dry-run-tspp" \
            --overall-status "pass" \
            --schema schemas/combined-assurance-manifest.schema.json \
            --out /tmp/dry-run-manifest.json \
            --dry-run
