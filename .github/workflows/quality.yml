name: quality
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  markdown_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Markdown lint
        uses: avto-dev/markdown-lint@04d43ee9191307b50935a753da3b775ab695eceb # v1
        with:
          config: '.markdownlint.yml'
          args: '**/*.md'
  link_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            --verbose --no-progress
            --max-retries 3 --retry-wait-time 2 --timeout 20
            --max-redirects 10
            --accept 200,201,202,204,206,301,302,303,307,308,401,403,429
            '**/*.md'
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: Validate examples against schemas
        run: python tools/validate_examples.py
      - name: Regenerate operational stack demo bundle
        run: |
          rm -rf /tmp/operational-stack
          python tools/run_operational_stack.py \
            --cts-report examples/operational-stack/demo-input/cts-report.json \
            --tspp-report examples/operational-stack/demo-input/tspp-report.json \
            --target https://directory.example.org \
            --build-id opstack-demo-001 \
            --target-id demo-directory \
            --run-id opstack-demo-001 \
            --assurance-profile profiles/al2-verified.yaml \
            --out /tmp/operational-stack
      - name: Validate regenerated bundle
        run: python tools/validate_operational_stack.py --bundle-dir /tmp/operational-stack
      - name: Validate checked-in bundle
        run: python tools/validate_operational_stack.py --bundle-dir artifacts/operational-stack
      - name: Doc tests (JSON/YAML parse hygiene)
        run: python scripts/doc_tests.py
      - name: generate-manifest dry-run (manifest generation path stays green)
        run: |
          python tools/generate-manifest.py \
            --build-id "dry-run-check" \
            --target "https://registry.example.org" \
            --cs-version "1.2.1" \
            --cs-profile-id "baseline" \
            --cs-run-id "dry-run-run" \
            --tspp-version "0.10.1" \
            --tspp-assurance-level "AL1" \
            --tspp-run-id "dry-run-run" \
            --overall-status "pass" \
            --artifact "log:README.md:trqp_assurance_hub:text/markdown:readme-v1:dry-run placeholder" \
            --base-dir . \
            --schema schemas/combined-assurance-manifest.schema.json \
            --out /tmp/dry-run-manifest.json \
            --dry-run
