name: quality

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  markdown_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Markdown lint
        uses: avto-dev/markdown-lint@04d43ee9191307b50935a753da3b775ab695eceb # v1
        with:
          args: '**/*.md'

  link_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Be strict on real breakage, but resilient to transient network churn and 429s.
          args: >-
            --verbose --no-progress
            --max-retries 3 --retry-wait-time 2 --timeout 20
            --max-redirects 10
            --accept 200,201,202,204,206,301,302,303,307,308,401,403,429
            '**/*.md'
