name: combined-assurance-smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target TRQP registry base URL (e.g., https://registry.example.org)"
        required: true
        default: "https://registry.example.org"
      conformance_profile:
        description: "Conformance Suite profile ID"
        required: true
        default: "smoke"
      tspp_assurance_level:
        description: "TSPP assurance level"
        required: true
        default: "AL1"
      conformance_ref:
        description: "Conformance Suite git ref (tag/branch/SHA)"
        required: true
        default: "main"
      tspp_ref:
        description: "TSPP git ref (tag/branch/SHA)"
        required: true
        default: "main"
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Checkout trqp-conformance-suite
        uses: actions/checkout@v4
        with:
          repository: sankarshanmukhopadhyay/trqp-conformance-suite
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.conformance_ref || 'main' }}
          path: external/trqp-conformance-suite

      - name: Checkout TRQP-TSPP
        uses: actions/checkout@v4
        with:
          repository: sankarshanmukhopadhyay/TRQP-TSPP
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tspp_ref || 'main' }}
          path: external/TRQP-TSPP

      - name: Basic repo sanity checks
        shell: bash
        run: |
          set -euo pipefail
          test -f external/trqp-conformance-suite/README.md
          test -f external/TRQP-TSPP/README.md
          echo "Conformance suite HEAD: $(git -C external/trqp-conformance-suite rev-parse --short HEAD)"
          echo "TSPP HEAD: $(git -C external/TRQP-TSPP rev-parse --short HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Combined Assurance Manifest artifact
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install jsonschema

          mkdir -p artifacts

          HUB_SHA="${GITHUB_SHA}"
          CS_SHA="$(git -C external/trqp-conformance-suite rev-parse HEAD)"
          TSPP_SHA="$(git -C external/TRQP-TSPP rev-parse HEAD)"

          # Lightweight evidence placeholders so adopters can inspect artifacts even in a smoke run.
          cat > artifacts/conformance-suite-checkout.txt <<EOF
          repo=https://github.com/sankarshanmukhopadhyay/trqp-conformance-suite
          ref=${{ github.event_name == 'workflow_dispatch' && inputs.conformance_ref || 'main' }}
          commit=${CS_SHA}
          profile=${{ github.event_name == 'workflow_dispatch' && inputs.conformance_profile || 'smoke' }}
          EOF

          cat > artifacts/tspp-checkout.txt <<EOF
          repo=https://github.com/sankarshanmukhopadhyay/TRQP-TSPP
          ref=${{ github.event_name == 'workflow_dispatch' && inputs.tspp_ref || 'main' }}
          commit=${TSPP_SHA}
          assurance_level=${{ github.event_name == 'workflow_dispatch' && inputs.tspp_assurance_level || 'AL1' }}
          EOF

          python tools/generate-manifest.py             --build-id "${HUB_SHA}"             --target "${{ github.event_name == 'workflow_dispatch' && inputs.target || 'https://registry.example.org' }}"             --hub-commit "${HUB_SHA}"             --ci-run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"             --cs-version "${{ github.event_name == 'workflow_dispatch' && inputs.conformance_ref || 'main' }}"             --cs-profile-id "${{ github.event_name == 'workflow_dispatch' && inputs.conformance_profile || 'smoke' }}"             --cs-run-id "cts-${GITHUB_RUN_ID}"             --tspp-version "${{ github.event_name == 'workflow_dispatch' && inputs.tspp_ref || 'main' }}"             --tspp-assurance-level "${{ github.event_name == 'workflow_dispatch' && inputs.tspp_assurance_level || 'AL1' }}"             --tspp-run-id "tspp-${GITHUB_RUN_ID}"             --artifact "log:artifacts/conformance-suite-checkout.txt:trqp_conformance_suite:text/plain:smoke-v0:checkout metadata"             --artifact "log:artifacts/tspp-checkout.txt:trqp_tspp:text/plain:smoke-v0:checkout metadata"             --out artifacts/combined-assurance-manifest.json             --schema schemas/combined-assurance-manifest.schema.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-assurance-manifest
          path: artifacts/combined-assurance-manifest.json

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: combined-assurance-smoke-artifacts
          path: artifacts/*.txt
