name: combined-assurance-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  combined-assurance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub
        uses: actions/checkout@v7

      - name: Checkout conformance suite
        uses: actions/checkout@v7
        with:
          repository: sankarshanmukhopadhyay/trqp-conformance-suite
          ref: main
          path: external/trqp-conformance-suite

      - name: Checkout TSPP
        uses: actions/checkout@v7
        with:
          repository: sankarshanmukhopadhyay/TRQP-TSPP
          ref: main
          path: external/TRQP-TSPP

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            external/trqp-conformance-suite/cts/requirements.txt
            external/TRQP-TSPP/harness/requirements.txt

      - name: Install coordinated toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r external/trqp-conformance-suite/cts/requirements.txt
          python -m pip install -r external/TRQP-TSPP/harness/requirements.txt
          python -m pip install jsonschema pyyaml pytest

      - name: Generate CTS evidence
        working-directory: external/trqp-conformance-suite
        env:
          TRQP_RUN_ID: ots-${{ github.run_id }}
          TRQP_TARGET_ID: trqp-reference-fixture
        run: make assurance-check

      - name: Generate TSPP evidence
        working-directory: external/TRQP-TSPP
        env:
          TRQP_RUN_ID: ots-${{ github.run_id }}
          TRQP_TARGET_ID: trqp-reference-fixture
        run: make assurance-check

      - name: Compose and validate combined assurance
        run: |
          python tools/run_combined_assurance.py \
            --cts-report external/trqp-conformance-suite/artifacts/validation/cts-report.json \
            --tspp-report external/TRQP-TSPP/artifacts/validation/tspp-report.json \
            --out artifacts/combined-assurance
          python -m pytest -q tests/test_cross_stack_negative_cases.py

      - name: Upload immutable evidence chain
        uses: actions/upload-artifact@v7
        with:
          name: trqp-combined-assurance-${{ github.run_id }}
          path: |
            artifacts/combined-assurance/
            external/trqp-conformance-suite/artifacts/
            external/TRQP-TSPP/artifacts/
          if-no-files-found: error
