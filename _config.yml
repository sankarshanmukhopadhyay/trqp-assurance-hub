# GitHub Pages (Jekyll) configuration
title: "TRQP Assurance Hub"
description: "Assurance, adoption, and GRID-aligned directory documentation for TRQP."
theme: minima
markdown: kramdown
plugins:
  - jekyll-seo-tag
# Ensure these directories/files are published even if Jekyll would otherwise ignore them
include:
  - schemas
  - profiles
  - examples
